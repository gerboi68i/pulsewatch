name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/pulsewatch
          DIRECT_URL: postgresql://user:pass@localhost:5432/pulsewatch
          SESSION_SECRET: ci-build-only-not-a-real-secret
          CRON_SECRET: ci-build-only-not-a-real-secret
